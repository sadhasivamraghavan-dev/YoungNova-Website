<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YoungNova Website</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="nav">
    <h2 class="logo">YoungNova</h2>
    <nav>
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#services">Services</a>
      <a href="#contact">Contact</a>
    </nav>
  </div>
</header>
<section id="home" class="hero">
  <h1>Welcome to YoungNova</h1>
  <p>This is a complete website using HTML, CSS and JavaScript.</p>
  <button onclick="scrollToSection('contact')">Get Started</button>
</section>

<section id="about" class="section">
  <h2>About Us</h2>
  <p>YoungNova is a demo project created for learning web development.</p>
</section>

<section id="services" class="section">
  <h2>Our Services</h2>
  <div class="cards">
    <div class="card">Web Development</div>
    <div class="card">UI/UX Design</div>
    <div class="card">JavaScript Projects</div>
  </div>
</section>

<section id="contact" class="section">
  <h2>Contact Us</h2>
  <input type="text" id="name" placeholder="Your Name">
  <input type="email" id="email" placeholder="Your Email">
  <textarea id="message" placeholder="Your Message"></textarea>
  <button onclick="sendMessage()">Send</button>
  <p id="msg"></p>
</section>

<footer>
<p>© 2026 YoungNova Website</p>
</footer>

<script src="script.js"></script>
</body>
</html>
